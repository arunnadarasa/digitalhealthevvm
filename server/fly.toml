# fly.toml for x402 DHM test server
# Deploy: fly deploy
# Set secrets: fly secrets set EXECUTOR_PRIVATE_KEY=0x... RECIPIENT_ADDRESS=0x... (and optionally RPC_URL, EVVM_ID, etc.)

app = "evvm-x402-dhm"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
